<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Batch Fire Mapping</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>Batch Fire Mapping</h1>
    <span class="subtitle">
        {{ raster_name }} &middot; {{ polygon_name }} &middot;
        <span id="fire-count">{{ n_fires }} fires</span>
    </span>
    {{{ admin_link }}}
    <a href="/logout" class="btn btn-secondary" style="font-size:11px;padding:3px 10px">Logout</a>
    <img src="/static/BC-Wildfire-Service-logo.png" alt="BC Wildfire Service" class="header-logo">
</header>

<!-- Filter panel -->
<div class="filter-panel">
    <div class="filter-panel-header" onclick="document.querySelector('.filter-panel').classList.toggle('open')">
        <span>Filters</span>
        <span class="filter-toggle-arrow"></span>
    </div>
    <div class="filter-panel-body">
        <div class="filter-row">
            <div class="filter-group">
                <label class="title">Year</label>
                <div class="checkboxes" id="year-filters"></div>
            </div>
            <div class="filter-group">
                <label class="title">Fire Number</label>
                <input type="text" id="filter-number" placeholder="regex, e.g. C11.*">
            </div>
            <div class="filter-group">
                <label class="title">Min Size (ha)</label>
                <input type="number" id="filter-min-size" step="any" min="0">
            </div>
            <div class="filter-group">
                <label class="title">Status</label>
                <div class="checkboxes" id="status-filters"></div>
            </div>
        </div>
        <div class="filter-actions">
            <button class="btn" onclick="applyFilters()">Apply</button>
            <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
            <span class="filter-preview-count" id="filter-preview-count"></span>
        </div>
    </div>
</div>

<!-- Recommended Settings -->
<div class="filter-panel" id="settings-panel">
    <div class="filter-panel-header" onclick="this.parentElement.classList.toggle('open')">
        <span>Recommended Settings</span>
        <span class="filter-toggle-arrow"></span>
    </div>
    <div class="filter-panel-body">
        <div id="settings-rows"></div>
        <div class="filter-actions">
            <button class="btn" onclick="addSettingsRow()">Add Threshold</button>
            <button class="btn btn-success" onclick="saveSettings()">Save</button>
            <span class="filter-preview-count" id="settings-status"></span>
        </div>
    </div>
</div>

<!-- Batch action bar (appears when fires are selected) -->
<div class="batch-bar" id="batch-bar" style="display:none">
    <span id="selected-count">0 selected</span>
    <button class="btn" id="btn-batch-map" onclick="batchMap()">Map Selected (with settings)</button>
    <button class="btn btn-danger" onclick="batchRemove()">Remove Selected</button>
    <button class="btn btn-success" onclick="downloadReport()">PDF Report (accepted)</button>
    <span class="batch-progress" id="batch-progress"></span>
</div>

<!-- Table -->
<div class="table-wrap">
<table>
    <thead>
        <tr>
            <th style="width:30px"><input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"></th>
            <th data-key="fire_numbe">Fire Number <span class="sort-arrow"></span></th>
            <th data-key="fire_date">Fire Date <span class="sort-arrow"></span></th>
            <th data-key="fire_year">Year <span class="sort-arrow"></span></th>
            <th data-key="fire_size_ha">Hint Size (ha) <span class="sort-arrow"></span></th>
            <th data-key="ml_area_ha">ML Size (ha) <span class="sort-arrow"></span></th>
            <th data-key="agreement_pct">Agreement <span class="sort-arrow"></span></th>
            <th data-key="status">Status <span class="sort-arrow"></span></th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>
</div>

<script>
// -----------------------------------------------------------------------
// State
// -----------------------------------------------------------------------
let allFires = [];
let sortKey = 'fire_size_ha';
let sortAsc = false;
let yearSet = new Set();
let statusSet = new Set();
let selectedFires = new Set();

const STATUS_ORDER = [
    'pending', 'preparing', 'ready', 'mapping', 'mapped', 'accepted', 'error'
];

// -----------------------------------------------------------------------
// Fetch fire list
// -----------------------------------------------------------------------
async function loadFires() {
    const r = await fetch('/api/fires');
    allFires = await r.json();
    buildFilterUI();
    restoreFilterState();
    render();
}

// -----------------------------------------------------------------------
// Build dynamic filter checkboxes
// -----------------------------------------------------------------------
function buildFilterUI() {
    // Years
    const years = [...new Set(allFires.map(f => f.fire_year))].filter(Boolean).sort();
    const yDiv = document.getElementById('year-filters');
    yDiv.innerHTML = '';
    for (const y of years) {
        yearSet.add(y);
        const lbl = document.createElement('label');
        lbl.innerHTML = `<input type="checkbox" checked value="${y}"> ${y}`;
        yDiv.appendChild(lbl);
    }

    // Statuses
    const statuses = [...new Set(allFires.map(f => f.status))].sort(
        (a, b) => STATUS_ORDER.indexOf(a) - STATUS_ORDER.indexOf(b));
    const sDiv = document.getElementById('status-filters');
    sDiv.innerHTML = '';
    for (const s of statuses) {
        statusSet.add(s);
        const lbl = document.createElement('label');
        lbl.innerHTML = `<input type="checkbox" checked value="${s}"> ${s}`;
        sDiv.appendChild(lbl);
    }
}

function saveFilterState() {
    const state = {
        years: [...yearSet],
        statuses: [...statusSet],
        number: document.getElementById('filter-number').value,
        minSize: document.getElementById('filter-min-size').value,
        sortKey, sortAsc,
    };
    sessionStorage.setItem('fireFilters', JSON.stringify(state));
}

function restoreFilterState() {
    const raw = sessionStorage.getItem('fireFilters');
    if (!raw) return false;
    try {
        const s = JSON.parse(raw);
        if (s.number) document.getElementById('filter-number').value = s.number;
        if (s.minSize) document.getElementById('filter-min-size').value = s.minSize;
        if (s.sortKey) { sortKey = s.sortKey; sortAsc = !!s.sortAsc; }
        if (s.years) {
            yearSet.clear();
            s.years.forEach(y => yearSet.add(y));
            document.querySelectorAll('#year-filters input').forEach(cb => {
                const v = parseInt(cb.value) || cb.value;
                cb.checked = yearSet.has(v);
            });
        }
        if (s.statuses) {
            statusSet.clear();
            s.statuses.forEach(st => statusSet.add(st));
            document.querySelectorAll('#status-filters input').forEach(cb => {
                cb.checked = statusSet.has(cb.value);
            });
        }
        return true;
    } catch { return false; }
}

function applyFilters() {
    // Read checkbox states
    yearSet.clear();
    document.querySelectorAll('#year-filters input:checked').forEach(cb => {
        yearSet.add(parseInt(cb.value) || cb.value);
    });
    statusSet.clear();
    document.querySelectorAll('#status-filters input:checked').forEach(cb => {
        statusSet.add(cb.value);
    });
    saveFilterState();
    render();
}

function previewFilterCount() {
    // Count how many fires would match current filter state (before Apply)
    const tmpYears = new Set();
    document.querySelectorAll('#year-filters input:checked').forEach(cb => {
        tmpYears.add(parseInt(cb.value) || cb.value);
    });
    const tmpStatuses = new Set();
    document.querySelectorAll('#status-filters input:checked').forEach(cb => {
        tmpStatuses.add(cb.value);
    });
    const numPat = document.getElementById('filter-number').value.trim();
    const minSize = parseFloat(document.getElementById('filter-min-size').value) || 0;
    let re = null;
    if (numPat) { try { re = new RegExp(numPat, 'i'); } catch {} }

    const count = allFires.filter(f => {
        if (f.fire_year && !tmpYears.has(f.fire_year)) return false;
        if (!tmpStatuses.has(f.status)) return false;
        if (f.fire_size_ha < minSize) return false;
        if (re && !re.test(f.fire_numbe)) return false;
        return true;
    }).length;

    document.getElementById('filter-preview-count').textContent =
        `${count} / ${allFires.length} matches`;
}

function resetFilters() {
    document.getElementById('filter-number').value = '';
    document.getElementById('filter-min-size').value = '';
    document.querySelectorAll('#year-filters input, #status-filters input').forEach(cb => {
        cb.checked = true;
    });
    yearSet.clear();
    document.querySelectorAll('#year-filters input').forEach(cb => {
        yearSet.add(parseInt(cb.value) || cb.value);
    });
    statusSet.clear();
    document.querySelectorAll('#status-filters input').forEach(cb => {
        statusSet.add(cb.value);
    });
    sessionStorage.removeItem('fireFilters');
    render();
}

// -----------------------------------------------------------------------
// Render table
// -----------------------------------------------------------------------
function render() {
    const numPat = document.getElementById('filter-number').value.trim();
    const minSize = parseFloat(document.getElementById('filter-min-size').value) || 0;

    let re = null;
    if (numPat) {
        try { re = new RegExp(numPat, 'i'); } catch {}
    }

    let filtered = allFires.filter(f => {
        if (f.fire_year && !yearSet.has(f.fire_year)) return false;
        if (!statusSet.has(f.status)) return false;
        if (f.fire_size_ha < minSize) return false;
        if (re && !re.test(f.fire_numbe)) return false;
        return true;
    });

    // Sort
    filtered.sort((a, b) => {
        let va = a[sortKey], vb = b[sortKey];
        if (va == null) va = '';
        if (vb == null) vb = '';
        let cmp;
        if (typeof va === 'number' && typeof vb === 'number') {
            cmp = va - vb;
        } else {
            cmp = String(va).localeCompare(String(vb));
        }
        return sortAsc ? cmp : -cmp;
    });

    // Update header count
    document.getElementById('fire-count').textContent =
        `${filtered.length} / ${allFires.length} fires`;

    // Build rows
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    for (const f of filtered) {
        const tr = document.createElement('tr');
        const badge = `<span class="status-badge status-${f.status}">${f.status}</span>`;
        const prevBadge = f.previously_accepted
            ? '<span class="status-badge status-accepted status-badge-muted">accepted</span> '
            : '';
        const checked = selectedFires.has(f.fire_numbe) ? 'checked' : '';
        const agr = f.agreement_pct >= 0 ? f.agreement_pct + '%' : '';
        const mlSize = f.ml_area_ha >= 0 ? f.ml_area_ha.toLocaleString() : '';
        const noteIcon = f.notes ? ` <span title="${esc(f.notes)}" style="cursor:help;color:#888">&#9998;</span>` : '';
        tr.innerHTML = `
            <td><input type="checkbox" class="fire-check" value="${encodeURIComponent(f.fire_numbe)}" ${checked} onchange="updateSelection()"></td>
            <td><strong>${esc(f.fire_numbe)}</strong>${noteIcon}</td>
            <td>${esc(f.fire_date)}</td>
            <td>${f.fire_year || ''}</td>
            <td>${f.fire_size_ha != null ? f.fire_size_ha.toLocaleString() : ''}</td>
            <td>${mlSize}</td>
            <td>${agr}</td>
            <td>${prevBadge}${badge}</td>
            <td><a href="/fire/${encodeURIComponent(f.fire_numbe)}" class="btn">Open</a></td>
        `;
        tbody.appendChild(tr);
    }
    updateSelection();

    // Save filtered+sorted order for Next/Prev navigation on mapping page
    sessionStorage.setItem('fireOrder',
        JSON.stringify(filtered.map(f => f.fire_numbe)));

    // Update sort arrows
    document.querySelectorAll('thead th[data-key]').forEach(th => {
        const arrow = th.querySelector('.sort-arrow');
        if (th.dataset.key === sortKey) {
            arrow.textContent = sortAsc ? ' ▲' : ' ▼';
        } else {
            arrow.textContent = '';
        }
    });
}

function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// -----------------------------------------------------------------------
// Event listeners
// -----------------------------------------------------------------------
document.querySelectorAll('thead th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
        const key = th.dataset.key;
        if (sortKey === key) { sortAsc = !sortAsc; }
        else { sortKey = key; sortAsc = true; }
        saveFilterState();
        render();
    });
});

// Live preview count on any filter change
document.getElementById('filter-number').addEventListener('input', previewFilterCount);
document.getElementById('filter-min-size').addEventListener('input', previewFilterCount);
document.querySelector('.filter-panel-body').addEventListener('change', previewFilterCount);

// Apply filters on Enter key
document.getElementById('filter-number').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilters();
});
document.getElementById('filter-min-size').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilters();
});

// -----------------------------------------------------------------------
// Checkbox selection
// -----------------------------------------------------------------------
let batchRunning = false;

function updateSelection() {
    selectedFires.clear();
    document.querySelectorAll('.fire-check:checked').forEach(cb => {
        selectedFires.add(decodeURIComponent(cb.value));
    });
    const bar = document.getElementById('batch-bar');
    const count = selectedFires.size;
    if (count > 0 || batchRunning) {
        bar.style.display = 'flex';
        if (!batchRunning) {
            document.getElementById('selected-count').textContent =
                `${count} selected`;
        }
    } else {
        bar.style.display = 'none';
    }
}

function toggleSelectAll(master) {
    document.querySelectorAll('.fire-check').forEach(cb => {
        cb.checked = master.checked;
    });
    updateSelection();
}

// -----------------------------------------------------------------------
// Batch remove
// -----------------------------------------------------------------------
async function batchRemove() {
    const fires = [...selectedFires];
    if (!confirm(`Remove ${fires.length} fire(s) from the list?`)) return;
    for (const fn of fires) {
        try {
            await fetch(`/api/fire/${encodeURIComponent(fn)}/remove`,
                {method: 'POST', headers: {'X-Requested-With': 'fetch'}});
            allFires = allFires.filter(f => f.fire_numbe !== fn);
        } catch {}
    }
    selectedFires.clear();
    render();
}

// -----------------------------------------------------------------------
// Batch map with recommended settings
// -----------------------------------------------------------------------
async function batchMap() {
    const fires = [...selectedFires].filter(fn => {
        const f = allFires.find(x => x.fire_numbe === fn);
        return f && f.status !== 'accepted';
    });
    if (fires.length === 0) {
        alert('No eligible fires selected (accepted fires are skipped).');
        return;
    }
    if (!confirm(`Map ${fires.length} fire(s) with recommended settings?\n\nAccepted fires will be skipped.`)) return;

    document.getElementById('btn-batch-map').disabled = true;
    batchRunning = true;

    try {
        const r = await fetch('/api/batch/map', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'fetch'},
            body: JSON.stringify({fire_numbes: fires}),
        });
        const data = await r.json();
        if (data.error) {
            alert(data.error);
            document.getElementById('btn-batch-map').disabled = false;
            return;
        }
        pollBatchStatus();
    } catch (err) {
        alert('Failed to start batch: ' + err.message);
        document.getElementById('btn-batch-map').disabled = false;
    }
}

async function pollBatchStatus() {
    const prog = document.getElementById('batch-progress');
    try {
        const r = await fetch('/api/batch/status');
        const s = await r.json();
        if (s.running) {
            batchRunning = true;
            const current = s.current_fire ? ` (${s.current_fire})` : '';
            document.getElementById('selected-count').textContent = 'Batch running';
            prog.textContent =
                `${s.completed}/${s.total} done${current}`;
            document.getElementById('batch-bar').style.display = 'flex';
            setTimeout(pollBatchStatus, 3000);
        } else {
            batchRunning = false;
            const errors = (s.errors || []).length;
            prog.textContent = errors > 0
                ? `Batch complete. ${errors} error(s).`
                : 'Batch complete.';
            document.getElementById('btn-batch-map').disabled = false;
            setTimeout(() => { prog.textContent = ''; updateSelection(); }, 8000);
        }
    } catch {
        batchRunning = false;
        prog.textContent = '';
        document.getElementById('btn-batch-map').disabled = false;
    }
}

// -----------------------------------------------------------------------
// Recommended settings
// -----------------------------------------------------------------------
const DEFAULT_PARAMS = {
    padding: 0.1, sample_rate: 0.05, min_samples: 500, max_samples: 30000, seed: 123,
    embed_bands: '', tsne_perplexity: 60, tsne_learning_rate: 200,
    tsne_max_iter: 2000, tsne_init: 'pca', tsne_n_components: 2,
    tsne_random_state: 42, rf_n_estimators: 100, rf_max_depth: 15,
    rf_max_features: 'sqrt', rf_random_state: 42,
    controlled_ratio: 0.5, hdbscan_min_samples: 20, contour_width: 1,
};

let settings = [];

function paramInput(name, val, type, width) {
    const w = width || 55;
    return `<label class="sp-label">${name}<input type="${type||'number'}" ` +
           `data-param="${name}" value="${val}" style="width:${w}px"></label>`;
}

function renderSettings() {
    const container = document.getElementById('settings-rows');
    container.innerHTML = '';
    settings.forEach((row, i) => {
        const maxLabel = row.max_ha != null ? row.max_ha + ' ha' : '∞';
        const p = row.params;
        const div = document.createElement('div');
        div.className = 'settings-row';
        div.dataset.index = i;
        div.innerHTML = `
            <div class="settings-row-header">
                <strong>${row.min_ha} ha → ${maxLabel}</strong>
                ${settings.length > 1 ? `<button class="btn btn-danger" style="font-size:10px;padding:1px 6px" onclick="removeSettingsRow(${i})">Remove</button>` : ''}
            </div>
            <div class="settings-row-params">
                ${paramInput('padding', p.padding, 'number', 45)}
                ${paramInput('sample_rate', p.sample_rate, 'number', 55)}
                ${paramInput('min_samples', p.min_samples, 'number', 55)}
                ${paramInput('max_samples', p.max_samples, 'number', 60)}
                ${paramInput('seed', p.seed, 'number', 45)}
                ${paramInput('embed_bands', p.embed_bands || '', 'text', 65)}
                ${paramInput('tsne_perplexity', p.tsne_perplexity, 'number', 45)}
                ${paramInput('tsne_learning_rate', p.tsne_learning_rate, 'number', 50)}
                ${paramInput('tsne_max_iter', p.tsne_max_iter, 'number', 50)}
                ${paramInput('controlled_ratio', p.controlled_ratio, 'number', 45)}
                ${paramInput('hdbscan_min_samples', p.hdbscan_min_samples, 'number', 40)}
                ${paramInput('rf_n_estimators', p.rf_n_estimators, 'number', 45)}
                ${paramInput('rf_max_depth', p.rf_max_depth, 'number', 40)}
                ${paramInput('rf_max_features', p.rf_max_features || 'sqrt', 'text', 50)}
                ${paramInput('contour_width', p.contour_width, 'number', 35)}
            </div>
        `;
        container.appendChild(div);
    });
}

function addSettingsRow() {
    if (settings.length === 0) {
        settings.push({min_ha: 0, max_ha: null, params: {...DEFAULT_PARAMS}});
    } else {
        const threshStr = prompt('Enter fire size threshold (ha) to split at:');
        if (!threshStr) return;
        const thresh = parseFloat(threshStr);
        if (isNaN(thresh) || thresh <= 0) return;
        // Find which row this threshold falls into
        let idx = settings.findIndex(r =>
            thresh > r.min_ha && (r.max_ha == null || thresh < r.max_ha));
        if (idx < 0) { alert('Threshold out of range'); return; }
        const old = settings[idx];
        const newRow = {min_ha: thresh, max_ha: old.max_ha,
                        params: {...old.params}};
        old.max_ha = thresh;
        settings.splice(idx + 1, 0, newRow);
    }
    renderSettings();
}

function removeSettingsRow(i) {
    if (settings.length <= 1) return;
    if (i === 0) {
        settings[1].min_ha = 0;
    } else if (i === settings.length - 1) {
        settings[i - 1].max_ha = null;
    } else {
        settings[i + 1].min_ha = settings[i].min_ha;
    }
    settings.splice(i, 1);
    renderSettings();
}

function readSettingsFromDOM() {
    document.querySelectorAll('.settings-row').forEach(div => {
        const i = parseInt(div.dataset.index);
        div.querySelectorAll('[data-param]').forEach(inp => {
            const key = inp.dataset.param;
            let val = inp.value.trim();
            if (inp.type === 'number' && val !== '') val = parseFloat(val);
            settings[i].params[key] = val;
        });
    });
}

async function saveSettings() {
    readSettingsFromDOM();
    const statusEl = document.getElementById('settings-status');
    try {
        await fetch('/api/settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'fetch'},
            body: JSON.stringify({settings}),
        });
        statusEl.textContent = 'Saved!';
        setTimeout(() => statusEl.textContent = '', 2000);
    } catch (err) {
        statusEl.textContent = 'Save failed';
    }
}

async function loadSettings() {
    try {
        const r = await fetch('/api/settings');
        const data = await r.json();
        if (Array.isArray(data) && data.length > 0) {
            settings = data;
        } else {
            settings = [{min_ha: 0, max_ha: null, params: {...DEFAULT_PARAMS}}];
        }
    } catch {
        settings = [{min_ha: 0, max_ha: null, params: {...DEFAULT_PARAMS}}];
    }
    renderSettings();
}

// -----------------------------------------------------------------------
// Auto-refresh fire list every 5 seconds
// -----------------------------------------------------------------------
async function refreshFires() {
    try {
        const r = await fetch('/api/fires');
        const newFires = await r.json();
        // Update statuses without disrupting filters
        const statusMap = {};
        newFires.forEach(f => statusMap[f.fire_numbe] = f);
        allFires = newFires;
        render();
    } catch {}
}

setInterval(refreshFires, 5000);

// -----------------------------------------------------------------------
// Download PDF report of accepted fires
// -----------------------------------------------------------------------
function downloadReport() {
    // Only accepted fires from the selection
    const accepted = [...selectedFires].filter(fn => {
        const f = allFires.find(x => x.fire_numbe === fn);
        return f && f.status === 'accepted';
    });
    if (accepted.length === 0) {
        alert('No accepted fires selected. Select accepted fires to generate a report.');
        return;
    }
    const params = accepted.map(fn => `fire=${encodeURIComponent(fn)}`).join('&');
    window.location.href = `/api/report?${params}`;
}

// -----------------------------------------------------------------------
// Check if batch is already running on page load
// -----------------------------------------------------------------------
async function checkBatchOnLoad() {
    try {
        const r = await fetch('/api/batch/status');
        const s = await r.json();
        if (s.running) {
            batchRunning = true;
            document.getElementById('batch-bar').style.display = 'flex';
            document.getElementById('selected-count').textContent = 'Batch running';
            document.getElementById('btn-batch-map').disabled = true;
            pollBatchStatus();
        }
    } catch {}
}

// -----------------------------------------------------------------------
// Init
// -----------------------------------------------------------------------
loadFires();
loadSettings();
checkBatchOnLoad();
</script>
</body>
</html>
