<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ fire_numbe }} — Analyzer Gallery</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .afire-header {
            padding: 12px 24px;
            background: #eef5fb;
            border-bottom: 1px solid #cbd5e1;
        }
        .afire-header .meta { font-size: 12px; color: #475569; }
        .afire-section {
            margin: 12px 24px;
            padding: 10px 12px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
        }
        .console-box {
            font-family: monospace;
            font-size: 11px;
            background: #0f172a;
            color: #cbd5e1;
            padding: 8px;
            max-height: 220px;
            overflow-y: auto;
            white-space: pre-wrap;
            border-radius: 3px;
        }
        .run-group {
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            margin-bottom: 14px;
            background: #fff;
        }
        .run-group-header {
            padding: 8px 12px;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .run-group-header .digest {
            font-family: monospace;
            font-size: 11px;
            font-weight: normal;
            color: #475569;
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .run-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 10px;
        }
        .run-card {
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }
        .run-card.accepted {
            border-color: #d4af37;
            background: #fffbe6;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
        }
        .run-card .thumb-wrap {
            background: #000;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .run-card .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: zoom-in;
        }
        .run-card .meta {
            padding: 6px 8px;
            font-size: 12px;
            color: #334155;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .run-card .meta .agr {
            font-weight: 600;
            color: #1e40af;
        }
        .run-card .accepted-badge {
            background: #d4af37;
            color: #fff;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 2px;
            display: inline-block;
            width: fit-content;
        }
        .run-card .actions {
            padding: 4px 8px 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .run-card .actions .btn { font-size: 11px; padding: 3px 10px; }
        .run-card details {
            font-size: 11px;
            padding: 4px 8px;
            border-top: 1px solid #e5e7eb;
        }
        .run-card details pre {
            white-space: pre-wrap;
            margin: 4px 0 0;
            font-size: 10px;
            color: #475569;
        }
        .status-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 2px 7px;
            border-radius: 2px;
        }
        .status-pending   { background: #e5e7eb; color: #475569; }
        .status-analyzing { background: #dbeafe; color: #1d4ed8; }
        .status-analyzed  { background: #dcfce7; color: #166534; }
        .status-partial   { background: #fef9c3; color: #854d0e; }
        .status-error     { background: #fee2e2; color: #b91c1c; }
        /* Viewer modal for clicked thumbs */
        .viewer-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: zoom-out;
        }
        .viewer-modal img {
            max-width: 96vw;
            max-height: 90vh;
            image-rendering: pixelated;
        }
        .viewer-modal .label {
            position: absolute;
            top: 12px;
            left: 16px;
            color: #fff;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <h1>Analyzer Gallery — {{ fire_numbe }}</h1>
    <span class="subtitle">
        {{ fire_date }} &middot; {{ fire_year }} &middot; {{ fire_size_ha }} ha
    </span>
    <a href="/analyzer" class="back-link">Back to analyzer</a>
    <a href="/logout" class="btn btn-secondary" style="font-size:11px;padding:3px 10px">Logout</a>
    <img src="/static/BC-Wildfire-Service-logo.png" alt="BC Wildfire Service" class="header-logo">
</header>

<div class="afire-header">
    <div style="display:flex;align-items:center;gap:10px">
        <span class="status-badge" id="status-badge">loading</span>
        <span id="progress-text" class="meta"></span>
    </div>
    <div class="meta" style="margin-top:4px" id="saved-crop-meta"></div>
</div>

<!-- Composite overlay viewer (all accepted perimeters on max-crop backdrop) -->
<div class="afire-section" id="overlay-section" style="display:none">
    <h3 style="margin:0 0 6px 0;font-size:13px;text-transform:uppercase;color:#334155">
        Accepted perimeters overlay
        <span style="font-size:11px;color:#64748b;font-weight:normal">
            (all accepts on the biggest-padded crop)
        </span>
    </h3>
    <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap">
        <img id="overlay-img" style="max-width:640px;max-height:640px;border:1px solid #cbd5e1;cursor:zoom-in">
        <div id="overlay-legend" style="font-size:12px;display:flex;flex-direction:column;gap:4px"></div>
    </div>
</div>

<!-- Console -->
<div class="afire-section">
    <h3 style="margin:0 0 6px 0;font-size:13px;text-transform:uppercase;color:#334155">Worker console</h3>
    <div class="console-box" id="console-box">(no output yet)</div>
</div>

<!-- Gallery -->
<div class="afire-section">
    <h3 style="margin:0 0 8px 0;font-size:13px;text-transform:uppercase;color:#334155">
        Runs gallery
        <span id="gallery-summary" style="font-size:11px;color:#64748b;font-weight:normal"></span>
    </h3>
    <div id="gallery"></div>
</div>

<!-- Modal viewer -->
<div class="viewer-modal" id="viewer" onclick="closeViewer()">
    <div class="label" id="viewer-label"></div>
    <img id="viewer-img" alt="">
</div>

<script>
const FIRE = {{{ fire_numbe_json }}};

function escapeHTML(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function openViewer(src, label) {
    document.getElementById('viewer-img').src = src;
    document.getElementById('viewer-label').textContent = label;
    document.getElementById('viewer').style.display = 'flex';
}
function closeViewer() {
    document.getElementById('viewer').style.display = 'none';
    document.getElementById('viewer-img').src = '';
}

function paramsDigest(ps) {
    if (!ps) return '(no distinctive params)';
    const keys = ['hdbscan_min_samples', 'controlled_ratio',
                  'tsne_perplexity', 'padding', 'sample_rate', 'embed_bands'];
    const parts = [];
    for (const k of keys) {
        if (ps[k] !== undefined && ps[k] !== '') parts.push(`${k}=${ps[k]}`);
    }
    return parts.join(', ');
}

async function load() {
    const r = await fetch(`/api/analyzer/fire/${encodeURIComponent(FIRE)}/status`);
    if (!r.ok) {
        document.getElementById('status-badge').textContent = 'error';
        return;
    }
    const data = await r.json();

    // Status badge + progress
    const badge = document.getElementById('status-badge');
    badge.textContent = data.status;
    badge.className = 'status-badge status-' + data.status;
    const pt = document.getElementById('progress-text');
    if (data.running && data.batch) {
        pt.textContent = `worker running: ${data.batch.completed_fires}/${data.batch.total_fires} fires, ${data.batch.completed_runs}/${data.batch.total_runs} runs`;
    } else {
        const accepted = (data.runs || []).filter(r => r.accepted).length;
        const total = (data.runs || []).length;
        pt.textContent = `${total} run(s) on disk, ${accepted} accepted`;
    }

    // Saved crop meta
    const scm = document.getElementById('saved-crop-meta');
    if (data.saved_max_padding > 0) {
        scm.textContent = `Overlay backdrop: ${data.saved_max_crop} (padding = ${data.saved_max_padding})`;
    } else {
        scm.textContent = 'No accepted runs yet — overlay backdrop not set.';
    }

    // Console
    const cb = document.getElementById('console-box');
    const lines = data.console || [];
    cb.textContent = lines.length ? lines.join('\n') : '(no output yet)';
    cb.scrollTop = cb.scrollHeight;

    // Gallery — group runs by set_idx
    renderGallery(data.runs || [], data.param_sets || []);

    // Overlay viewer: only show when there's at least one accepted run
    const anyAccepted = (data.runs || []).some(r => r.accepted);
    const overlaySection = document.getElementById('overlay-section');
    if (anyAccepted && data.saved_max_padding > 0) {
        overlaySection.style.display = '';
        const img = document.getElementById('overlay-img');
        const url = `/api/analyzer/fire/${encodeURIComponent(FIRE)}/overlay?t=${Date.now()}`;
        img.src = url;
        img.onclick = () => openViewer(url, `${FIRE} overlay — ${data.runs.filter(r => r.accepted).length} accepted perimeter(s)`);
        renderLegend();
    } else {
        overlaySection.style.display = 'none';
    }
}

async function renderLegend() {
    try {
        const r = await fetch(`/api/analyzer/fire/${encodeURIComponent(FIRE)}/overlay/legend`);
        if (!r.ok) return;
        const legend = await r.json();
        const box = document.getElementById('overlay-legend');
        if (!legend.length) {
            box.innerHTML = '<span style="color:#64748b">(legend not yet built)</span>';
            return;
        }
        box.innerHTML = legend.map(e => {
            const [r, g, b] = e.color_rgb;
            const swatch = `<span style="display:inline-block;width:12px;height:12px;background:rgb(${r},${g},${b});margin-right:6px;border:1px solid #999;vertical-align:middle"></span>`;
            return `<div>${swatch}${e.accept_id} &middot; ${e.agreement_pct}% &middot; padding=${e.padding_used} &middot; set ${e.set_idx} run ${e.run_idx}</div>`;
        }).join('');
    } catch (e) {}
}

function renderGallery(runs, paramSets) {
    const gallery = document.getElementById('gallery');
    const summary = document.getElementById('gallery-summary');

    // Build the union of observed set indices + configured sets.
    const groupKeys = new Set(runs.map(r => r.set_idx));
    for (let i = 0; i < paramSets.length; i++) groupKeys.add(i);
    const sortedSets = [...groupKeys].sort((a, b) => a - b);

    summary.textContent = runs.length
        ? `(${runs.length} run(s), ${runs.filter(r => r.accepted).length} accepted)`
        : '';

    if (!sortedSets.length) {
        gallery.innerHTML = '<div style="font-size:12px;color:#64748b">No runs yet. Go back to the analyzer page, configure param sets + fires, and click "Run Analyzing".</div>';
        return;
    }

    gallery.innerHTML = '';
    for (const setIdx of sortedSets) {
        const ps = paramSets[setIdx] || {};
        const setRuns = runs.filter(r => r.set_idx === setIdx)
                            .sort((a, b) => a.run_idx - b.run_idx);
        const label = ps.name || `Set ${setIdx + 1}`;

        const group = document.createElement('div');
        group.className = 'run-group';
        group.innerHTML = `
            <div class="run-group-header">
                <span>${escapeHTML(label)}</span>
                <span class="digest">${escapeHTML(paramsDigest(ps))}</span>
                <span style="color:#64748b;font-size:11px;font-weight:normal">${setRuns.length} run(s)</span>
            </div>
            <div class="run-cards" id="set-${setIdx}-cards"></div>
        `;
        gallery.appendChild(group);

        const cardsDiv = group.querySelector(`#set-${setIdx}-cards`);
        if (!setRuns.length) {
            cardsDiv.innerHTML = '<div style="font-size:11px;color:#94a3b8;padding:10px">Not yet run.</div>';
            continue;
        }
        for (const run of setRuns) cardsDiv.appendChild(renderCard(run));
    }
}

function renderCard(run) {
    const card = document.createElement('div');
    card.className = 'run-card' + (run.accepted ? ' accepted' : '');
    const thumbUrl = run.has_thumb
        ? `/api/analyzer/fire/${encodeURIComponent(FIRE)}/run/${run.set_idx}/${run.run_idx}/image?type=thumb&t=${Date.now()}`
        : '';
    const compUrl = run.has_comparison
        ? `/api/analyzer/fire/${encodeURIComponent(FIRE)}/run/${run.set_idx}/${run.run_idx}/image?type=comparison&t=${Date.now()}`
        : '';

    const thumbNode = thumbUrl
        ? `<img src="${thumbUrl}" onclick="openViewer('${compUrl || thumbUrl}', 'Run ${run.set_idx}.${run.run_idx} — ${run.agreement_pct}% agreement')"
             alt="run ${run.set_idx}.${run.run_idx}">`
        : `<div style="color:#64748b;font-size:11px;text-align:center">No thumb</div>`;

    const badge = run.accepted
        ? `<span class="accepted-badge">accepted as ${escapeHTML(run.accept_id)}</span>` : '';

    const agr = run.agreement_pct >= 0
        ? `<span class="agr">${run.agreement_pct}% agreement</span>`
        : `<span style="color:#94a3b8">no agreement (${run.status})</span>`;

    const ml = run.ml_area_ha >= 0
        ? `${run.ml_area_ha} ha ML area`
        : '';

    const actions = run.accepted
        ? `<button class="btn btn-danger" onclick="unacceptRun('${escapeAttr(run.accept_id)}')">Unaccept</button>`
        : `<button class="btn btn-success" onclick="acceptRun(${run.set_idx}, ${run.run_idx}, this)"
             ${run.status !== 'done' ? 'disabled' : ''}>Accept</button>`;

    const paramsText = Object.entries(run.params || {})
        .map(([k, v]) => `${k}: ${v}`).join('\n');

    card.innerHTML = `
        <div class="thumb-wrap">${thumbNode}</div>
        <div class="meta">
            <div>Run ${run.set_idx}.${run.run_idx}
                 <span style="color:#64748b;font-size:11px">padding=${run.padding_used}</span></div>
            <div>${agr}</div>
            ${ml ? `<div>${ml}</div>` : ''}
            ${badge}
            ${run.error_msg ? `<div style="color:#b91c1c;font-size:11px">${escapeHTML(run.error_msg)}</div>` : ''}
        </div>
        <div class="actions">
            ${actions}
        </div>
        <details>
            <summary>params</summary>
            <pre>${escapeHTML(paramsText || '(defaults only)')}</pre>
        </details>
    `;
    return card;
}

async function acceptRun(setIdx, runIdx, btn) {
    if (btn) { btn.disabled = true; btn.textContent = 'Accepting...'; }
    try {
        const r = await fetch(
            `/api/analyzer/fire/${encodeURIComponent(FIRE)}/accept`,
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'fetch',
                },
                body: JSON.stringify({set_idx: setIdx, run_idx: runIdx}),
            });
        const data = await r.json();
        if (!r.ok) {
            alert('Accept failed: ' + (data.error || r.status));
            if (btn) { btn.disabled = false; btn.textContent = 'Accept'; }
            return;
        }
        load();
    } catch (e) {
        alert('Accept error: ' + e);
        if (btn) { btn.disabled = false; btn.textContent = 'Accept'; }
    }
}

async function unacceptRun(acceptId) {
    if (!confirm(`Unaccept ${acceptId}? Files will be removed from analyzing_parameters/.`)) {
        return;
    }
    try {
        const r = await fetch(
            `/api/analyzer/fire/${encodeURIComponent(FIRE)}/unaccept`,
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'fetch',
                },
                body: JSON.stringify({accept_id: acceptId}),
            });
        const data = await r.json();
        if (!r.ok) {
            alert('Unaccept failed: ' + (data.error || r.status));
            return;
        }
        load();
    } catch (e) {
        alert('Unaccept error: ' + e);
    }
}

load();
setInterval(load, 5000);
</script>
</body>
</html>
