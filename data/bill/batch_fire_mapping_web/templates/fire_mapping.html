<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fire {{ fire_numbe }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <a id="btn-prev" class="btn btn-secondary" style="font-size:11px;padding:3px 10px;display:none" href="#">Prev</a>
    <h1>{{ fire_numbe }}</h1>
    <a id="btn-next" class="btn btn-secondary" style="font-size:11px;padding:3px 10px;display:none" href="#">Next</a>
    <button class="btn btn-danger" style="font-size:11px;padding:3px 10px" onclick="removeFire()">Remove</button>
    <a href="/" class="back-link">Back to fire list</a>
    <a href="/logout" class="btn btn-secondary" style="font-size:11px;padding:3px 10px">Logout</a>
</header>

<div class="fire-info-bar">
    <span>Date: <strong>{{ fire_date }}</strong></span>
    <span>Year: <strong>{{ fire_year }}</strong></span>
    <span>Size: <strong>{{ fire_size_ha }} ha</strong></span>
    <span>Status: <strong id="status-text">{{ fire_status }}</strong></span>
    <span id="agreement-info"></span>
    <span id="crop-info"></span>
</div>

<div class="main-content">

    <!-- =============================================================== -->
    <!-- LEFT: Image viewer                                              -->
    <!-- =============================================================== -->
    <div class="image-panel">
        <div class="image-controls">
            <select id="view-select" disabled>
                <option value="">Loading...</option>
            </select>
            <select id="view-select-right" disabled style="display:none" onchange="switchViewRight()">
                <option value="">Right pane...</option>
            </select>
            <button class="btn btn-secondary" style="font-size:11px;padding:2px 8px" onclick="zoomIn()">+</button>
            <button class="btn btn-secondary" style="font-size:11px;padding:2px 8px" onclick="zoomOut()">-</button>
            <button class="btn btn-secondary" style="font-size:11px;padding:2px 8px" onclick="zoomReset()">Fit</button>
            <button class="btn btn-secondary" style="font-size:11px;padding:2px 8px" id="btn-split" onclick="toggleSplit()">Split</button>
            <span class="info" id="zoom-info"></span>
            <span class="info" id="image-info"></span>
        </div>
        <div class="image-viewer-container" id="image-viewer-container">
            <div class="image-area" id="image-area">
                <span class="loading" id="loading-msg">Preparing fire data...</span>
                <img id="main-img" style="display:none" alt="Fire view">
            </div>
            <div class="image-area" id="image-area-right" style="display:none">
                <img id="right-img" style="display:none" alt="Comparison view">
            </div>
        </div>
    </div>

    <!-- Toggle for control panel -->
    <button class="panel-toggle" id="panel-toggle" onclick="toggleControlPanel()" title="Toggle panel">&#9654;</button>

    <!-- =============================================================== -->
    <!-- RIGHT: Parameters + controls + console                          -->
    <!-- =============================================================== -->
    <div class="control-panel" id="control-panel">

        <div class="params-scroll" id="params-scroll">

            <!-- Crop & Sampling -->
            <div class="param-section open">
                <h3 onclick="this.parentElement.classList.toggle('open')">Crop &amp; Sampling</h3>
                <div class="params-body">
                    <div class="param-row">
                        <label>Padding:</label>
                        <input type="number" id="p-padding" value="{{ padding }}" step="0.05" min="0" max="1">
                        <button class="btn btn-secondary" style="font-size:11px;padding:2px 8px" onclick="recrop()">Re-crop</button>
                    </div>
                    <div class="param-row">
                        <label>Sample rate:</label>
                        <input type="number" id="p-sample_rate" value="{{ sample_rate }}" step="0.01" min="0.001" max="1" oninput="updateSampleSize()">
                    </div>
                    <div class="param-row">
                        <label>Min samples:</label>
                        <input type="number" id="p-min_samples" value="{{ min_samples }}" oninput="updateSampleSize()">
                    </div>
                    <div class="param-row">
                        <label>Max samples:</label>
                        <input type="number" id="p-max_samples" value="{{ max_samples }}" oninput="updateSampleSize()">
                    </div>
                    <div class="param-row">
                        <label>Sample size:</label>
                        <span id="computed-sample-size" style="font-size:12px;color:#333;font-weight:600">—</span>
                    </div>
                    <div class="param-row">
                        <label>Seed:</label>
                        <input type="number" id="p-seed" value="123">
                    </div>
                </div>
            </div>

            <!-- T-SNE -->
            <div class="param-section">
                <h3 onclick="this.parentElement.classList.toggle('open')">T-SNE</h3>
                <div class="params-body">
                    <div class="param-row">
                        <label>Perplexity:</label>
                        <input type="number" id="p-tsne_perplexity" value="60" step="5">
                    </div>
                    <div class="param-row">
                        <label>Learning rate:</label>
                        <input type="number" id="p-tsne_learning_rate" value="200" step="50">
                    </div>
                    <div class="param-row">
                        <label>Max iter:</label>
                        <input type="number" id="p-tsne_max_iter" value="2000" step="100">
                    </div>
                    <div class="param-row">
                        <label>Init:</label>
                        <select id="p-tsne_init">
                            <option value="pca" selected>pca</option>
                            <option value="random">random</option>
                        </select>
                    </div>
                    <div class="param-row">
                        <label>Components:</label>
                        <input type="number" id="p-tsne_n_components" value="2" min="2" max="3">
                    </div>
                    <div class="param-row">
                        <label>Random state:</label>
                        <input type="number" id="p-tsne_random_state" value="42">
                    </div>
                    <div class="param-row">
                        <label>Embed bands:</label>
                        <input type="text" id="p-embed_bands" placeholder="all  (e.g. 1,2,3)">
                    </div>
                </div>
            </div>

            <!-- Random Forest -->
            <div class="param-section">
                <h3 onclick="this.parentElement.classList.toggle('open')">Random Forest</h3>
                <div class="params-body">
                    <div class="param-row">
                        <label>Estimators:</label>
                        <input type="number" id="p-rf_n_estimators" value="100">
                    </div>
                    <div class="param-row">
                        <label>Max depth:</label>
                        <input type="number" id="p-rf_max_depth" value="15">
                    </div>
                    <div class="param-row">
                        <label>Max features:</label>
                        <input type="text" id="p-rf_max_features" value="sqrt">
                    </div>
                    <div class="param-row">
                        <label>Random state:</label>
                        <input type="number" id="p-rf_random_state" value="42">
                    </div>
                </div>
            </div>

            <!-- HDBSCAN -->
            <div class="param-section">
                <h3 onclick="this.parentElement.classList.toggle('open')">HDBSCAN</h3>
                <div class="params-body">
                    <div class="param-row">
                        <label>Ctrl ratio:</label>
                        <input type="number" id="p-controlled_ratio" value="0.5" step="0.05" min="0.05" max="2">
                    </div>
                    <div class="param-row">
                        <label>Min samples:</label>
                        <input type="number" id="p-hdbscan_min_samples" value="20">
                    </div>
                </div>
            </div>

            <!-- Display -->
            <div class="param-section">
                <h3 onclick="this.parentElement.classList.toggle('open')">Display</h3>
                <div class="params-body">
                    <div class="param-row">
                        <label>Contour width:</label>
                        <input type="number" id="p-contour_width" value="1" min="1" max="5">
                    </div>
                </div>
            </div>

            <!-- Notes -->
            <div class="param-section open">
                <h3 onclick="this.parentElement.classList.toggle('open')">Notes</h3>
                <div class="params-body">
                    <textarea id="fire-notes" rows="2"
                        style="width:100%;font-size:12px;padding:4px 6px;border:1px solid #ccc;border-radius:3px;resize:vertical"
                        placeholder="Add notes about this fire..."
                        onchange="saveNotes()"></textarea>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="action-buttons">
                <button class="btn" id="btn-map" disabled onclick="startMapping()">
                    Map Fire
                </button>
                <button class="btn" id="btn-map-settings" disabled onclick="mapWithSettings()"
                    style="background:#555;font-size:12px;line-height:1.2">
                    Map Fire<br><small>with settings</small>
                </button>
                <button class="btn" id="btn-serial" disabled onclick="startSerialMap()"
                    style="background:#6a0dad;font-size:12px;line-height:1.2">
                    Serial Map<br><small>N=<input type="number" id="serial-n" value="3" min="1" max="10"
                        style="width:30px;font-size:11px;padding:0 2px;border:1px solid #999;border-radius:2px;text-align:center"
                        onclick="event.stopPropagation()"></small>
                </button>
                <button class="btn btn-success" id="btn-accept" style="display:none" onclick="acceptResult()">
                    Accept
                </button>
            </div>

            <!-- Serial results gallery -->
            <div id="serial-gallery" style="display:none">
                <div style="padding:8px 16px;border-top:1px solid #eee">
                    <h4 style="font-size:12px;color:#6b6b73;text-transform:uppercase;margin-bottom:8px">Serial Results</h4>
                    <div id="serial-gallery-items" style="display:flex;flex-direction:column;gap:6px"></div>
                </div>
            </div>

        </div><!-- /params-scroll -->

        <!-- Drag handle to resize console vs parameters -->
        <div class="resize-handle" id="resize-handle"></div>

        <!-- Console -->
        <div class="console-section" id="console-section">
            <div class="console-header">
                <h4>Console</h4>
                <div style="display:flex;gap:6px">
                    <button onclick="document.getElementById('console-output').innerHTML=''">clear</button>
                    <button id="console-toggle" onclick="toggleConsole()">&#9660;</button>
                </div>
            </div>
            <div id="console-output"></div>
        </div>

    </div><!-- /control-panel -->
</div><!-- /main-content -->

<script>
// -----------------------------------------------------------------------
// Constants
// -----------------------------------------------------------------------
const FIRE = {{{ fire_numbe_json }}};
let cropW = 0, cropH = 0;
let isMapping = false;
let hasComparison = false;
let sseActive = false;
let serverLineCount = 0;
let lastSerialCount = 0;

// -----------------------------------------------------------------------
// Console logging
// -----------------------------------------------------------------------
function log(msg, cls) {
    const out = document.getElementById('console-output');
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' line-' + cls : '');
    div.textContent = msg;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
}

// -----------------------------------------------------------------------
// Sample size computation
// -----------------------------------------------------------------------
function updateSampleSize() {
    if (!cropW || !cropH) return;
    const rate = parseFloat(document.getElementById('p-sample_rate').value) || 0.05;
    const mn = parseInt(document.getElementById('p-min_samples').value) || 500;
    const mx = parseInt(document.getElementById('p-max_samples').value) || 30000;
    let s = Math.round(cropW * cropH * rate);
    s = Math.max(mn, Math.min(mx, s));
    document.getElementById('computed-sample-size').textContent = s.toLocaleString();
}

// -----------------------------------------------------------------------
// Prepare fire on page load
// -----------------------------------------------------------------------
async function prepareFire(padding) {
    const loadMsg = document.getElementById('loading-msg');
    const img = document.getElementById('main-img');
    loadMsg.style.display = 'block';
    loadMsg.textContent = 'Preparing fire data...';
    img.style.display = 'none';

    const body = padding != null ? JSON.stringify({padding}) : '{}';

    try {
        const r = await fetch(`/api/fire/${FIRE}/prepare`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'fetch'},
            body: body,
        });
        const data = await r.json();

        if (data.status === 'error') {
            loadMsg.textContent = 'Error: ' + (data.error || 'unknown');
            log('Prepare error: ' + (data.error || 'unknown'), 'error');
            return;
        }

        cropW = data.crop_w || 0;
        cropH = data.crop_h || 0;

        // Populate view dropdown with preview images
        const sel = document.getElementById('view-select');
        sel.innerHTML = '';
        for (const v of (data.views || [])) {
            const opt = document.createElement('option');
            opt.value = v;
            const labels = {pre:'Pre-fire', post:'Post-fire', diff1:'Diff (norm)', diff2:'Diff (ratio)', result:'ML classification', hint:'Hint perimeter'};
            opt.textContent = labels[v] || v;
            sel.appendChild(opt);
        }

        // Add comparison views if results exist
        if (data.has_comparison) {
            const opt = document.createElement('option');
            opt.value = 'comparison';
            opt.textContent = 'Comparison (figure)';
            sel.appendChild(opt);
            hasComparison = true;
        }
        if (data.has_brush_comparison) {
            const opt = document.createElement('option');
            opt.value = 'brush_comparison';
            opt.textContent = 'Brush comparison';
            sel.appendChild(opt);
        }

        sel.disabled = false;

        // Mirror options to right-pane dropdown
        const selR = document.getElementById('view-select-right');
        selR.innerHTML = '';
        for (const opt of sel.options) {
            const o2 = document.createElement('option');
            o2.value = opt.value;
            o2.textContent = opt.textContent;
            selR.appendChild(o2);
        }
        selR.disabled = false;

        // Default views: left=post, right=result overlay (or comparison)
        if (data.views && data.views.includes('post')) {
            sel.value = 'post';
        }
        if (data.views && data.views.includes('result')) {
            selR.value = 'result';
        } else if (data.has_comparison) {
            selR.value = 'comparison';
        } else if (data.views && data.views.includes('pre')) {
            selR.value = 'pre';
        }

        // Show accept/retry buttons for mapped fires
        if (data.status === 'mapped') {
            document.getElementById('btn-accept').style.display = '';
        }

        // Status text with previously_accepted indicator
        const statusEl = document.getElementById('status-text');
        statusEl.textContent = data.status;
        if (data.previously_accepted) {
            statusEl.innerHTML += ' <span class="prev-accepted-badge" title="Previously accepted">&#10003;</span>';
        }

        document.getElementById('crop-info').innerHTML =
            `Crop: <strong>${cropW}&times;${cropH} px</strong> &middot; ` +
            `Hint: <strong>${data.perimeter_type || '?'}</strong> &middot; ` +
            `Accum: <strong>${data.acc_start || '?'} &rarr; ${data.acc_end || '?'}</strong>`;

        updateSampleSize();
        switchView();

        document.getElementById('btn-map').disabled = false;
        document.getElementById('btn-map-settings').disabled = false;
                    document.getElementById('btn-serial').disabled = false;
        log('Fire prepared. Ready to map.', 'success');

        // Restore console and params if fire is mapping or was mapped
        restoreFireState();

    } catch (err) {
        loadMsg.textContent = 'Error: ' + err.message;
        log('Prepare failed: ' + err.message, 'error');
    }
}

// -----------------------------------------------------------------------
// Re-crop with new padding
// -----------------------------------------------------------------------
async function recrop() {
    const pad = parseFloat(document.getElementById('p-padding').value);
    if (isNaN(pad)) return;
    log(`Re-cropping with padding=${pad}...`);
    document.getElementById('btn-map').disabled = true;
    hasComparison = false;
    const sel = document.getElementById('view-select');
    const compOpt = sel.querySelector('option[value="comparison"]');
    if (compOpt) compOpt.remove();
    const brushOpt = sel.querySelector('option[value="brush_comparison"]');
    if (brushOpt) brushOpt.remove();
    await prepareFire(pad);
}

// -----------------------------------------------------------------------
// Zoom & Pan state
// -----------------------------------------------------------------------
let zoomScale = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let dragStartPanX = 0, dragStartPanY = 0;

function updateTransform() {
    const img = document.getElementById('main-img');
    img.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
    document.getElementById('zoom-info').textContent = `${Math.round(zoomScale * 100)}%`;
    syncRightPane();
}

function zoomFit() {
    const img = document.getElementById('main-img');
    const area = document.getElementById('image-area');
    if (!img.naturalWidth || !img.naturalHeight) return;

    const aW = area.clientWidth;
    const aH = area.clientHeight;
    const iW = img.naturalWidth;
    const iH = img.naturalHeight;

    zoomScale = Math.min(aW / iW, aH / iH);
    panX = (aW - iW * zoomScale) / 2;
    panY = (aH - iH * zoomScale) / 2;
    updateTransform();
}

function zoomReset() { zoomFit(); }

function zoomIn() {
    const area = document.getElementById('image-area');
    const cx = area.clientWidth / 2;
    const cy = area.clientHeight / 2;
    applyZoom(cx, cy, 1.3);
}

function zoomOut() {
    const area = document.getElementById('image-area');
    const cx = area.clientWidth / 2;
    const cy = area.clientHeight / 2;
    applyZoom(cx, cy, 1 / 1.3);
}

function applyZoom(cx, cy, factor) {
    // Zoom towards the point (cx, cy) in container coords
    const newScale = Math.max(0.1, Math.min(200, zoomScale * factor));
    const ratio = newScale / zoomScale;
    panX = cx - ratio * (cx - panX);
    panY = cy - ratio * (cy - panY);
    zoomScale = newScale;
    updateTransform();
}

// Scroll wheel zoom
(function() {
    const area = document.getElementById('image-area');

    area.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = area.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
        applyZoom(cx, cy, factor);
    }, {passive: false});

    // Pan via mouse drag
    area.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragStartPanX = panX;
        dragStartPanY = panY;
        area.classList.add('dragging');
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        panX = dragStartPanX + (e.clientX - dragStartX);
        panY = dragStartPanY + (e.clientY - dragStartY);
        updateTransform();
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        area.classList.remove('dragging');
    });
})();

// -----------------------------------------------------------------------
// Switch preview view
// -----------------------------------------------------------------------
let firstLoad = true;

function switchView() {
    const view = document.getElementById('view-select').value;
    if (!view) return;

    const img = document.getElementById('main-img');
    const loadMsg = document.getElementById('loading-msg');

    if (view === 'comparison') {
        img.src = `/api/fire/${FIRE}/comparison?t=${Date.now()}`;
    } else if (view === 'brush_comparison') {
        img.src = `/api/fire/${FIRE}/brush_comparison?t=${Date.now()}`;
    } else {
        img.src = `/api/fire/${FIRE}/preview/${view}?t=${Date.now()}`;
    }

    img.onload = () => {
        loadMsg.style.display = 'none';
        img.style.display = 'block';
        if (firstLoad) { zoomFit(); firstLoad = false; }
        else { updateTransform(); }
    };
    img.onerror = () => {
        loadMsg.style.display = 'block';
        loadMsg.textContent = `View "${view}" not available`;
        img.style.display = 'none';
    };
}

document.getElementById('view-select').addEventListener('change', switchView);

// -----------------------------------------------------------------------
// Collect params from the form
// -----------------------------------------------------------------------
function getParams() {
    const v = id => {
        const el = document.getElementById(id);
        if (!el) return null;
        const val = el.value.trim();
        return val === '' ? null : val;
    };
    return {
        sample_rate:          parseFloat(v('p-sample_rate')) || 0.05,
        min_samples:          parseInt(v('p-min_samples')) || 500,
        max_samples:          parseInt(v('p-max_samples')) || 30000,
        seed:                 parseInt(v('p-seed')) || 123,
        tsne_perplexity:      parseFloat(v('p-tsne_perplexity')) || 60,
        tsne_learning_rate:   parseFloat(v('p-tsne_learning_rate')) || 200,
        tsne_max_iter:        parseInt(v('p-tsne_max_iter')) || 2000,
        tsne_init:            v('p-tsne_init') || 'pca',
        tsne_n_components:    parseInt(v('p-tsne_n_components')) || 2,
        tsne_random_state:    parseInt(v('p-tsne_random_state')) || 42,
        embed_bands:          v('p-embed_bands'),
        rf_n_estimators:      parseInt(v('p-rf_n_estimators')) || 100,
        rf_max_depth:         parseInt(v('p-rf_max_depth')) || 15,
        rf_max_features:      v('p-rf_max_features') || 'sqrt',
        rf_random_state:      parseInt(v('p-rf_random_state')) || 42,
        controlled_ratio:     parseFloat(v('p-controlled_ratio')) || 0.5,
        hdbscan_min_samples:  parseInt(v('p-hdbscan_min_samples')) || 20,
        contour_width:        parseInt(v('p-contour_width')) || 1,
    };
}

// -----------------------------------------------------------------------
// Start mapping via fetch + SSE streaming
// -----------------------------------------------------------------------
async function startMapping() {
    if (isMapping) return;
    isMapping = true;
    sseActive = true;
    let sseLogCount = 0;

    document.getElementById('btn-map').disabled = true;
    document.getElementById('btn-map-settings').disabled = true;
                    document.getElementById('btn-serial').disabled = true;
    document.getElementById('btn-accept').style.display = 'none';
    document.getElementById('status-text').textContent = 'mapping';

    serverLineCount = 0;
    log('Starting mapping...', 'dim');

    try {
        const response = await fetch(`/api/fire/${FIRE}/map`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Requested-With': 'fetch'},
            body: JSON.stringify({params: getParams()}),
        });

        if (!response.ok) {
            const err = await response.json();
            log('ERROR: ' + (err.error || response.statusText), 'error');
            isMapping = false;
            document.getElementById('btn-map').disabled = false;
            document.getElementById('btn-map-settings').disabled = false;
                    document.getElementById('btn-serial').disabled = false;
            document.getElementById('status-text').textContent = 'ready';
            return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream: true});

            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                let data;
                try {
                    data = JSON.parse(line.slice(6));
                } catch { continue; }

                if (data.type === 'log') {
                    log(data.message);
                    sseLogCount++;

                } else if (data.type === 'complete') {
                    log('Mapping complete!', 'success');
                    isMapping = false;
                    hasComparison = true;

                    // Add result options to both dropdowns
                    const newViews = [
                        ['result', 'ML classification'],
                        ['comparison', 'Comparison (figure)'],
                        ['brush_comparison', 'Brush comparison'],
                    ];
                    for (const selId of ['view-select', 'view-select-right']) {
                        const s = document.getElementById(selId);
                        for (const [val, label] of newViews) {
                            if (!s.querySelector(`option[value="${val}"]`)) {
                                const opt = document.createElement('option');
                                opt.value = val;
                                opt.textContent = label;
                                s.appendChild(opt);
                            }
                        }
                    }
                    document.getElementById('view-select').value = 'post';
                    document.getElementById('view-select-right').value = 'result';
                    switchView();
                    if (splitActive) switchViewRight();

                    document.getElementById('btn-map').disabled = false;
                    document.getElementById('btn-map-settings').disabled = false;
                    document.getElementById('btn-serial').disabled = false;
                    document.getElementById('btn-accept').style.display = '';
                    document.getElementById('status-text').textContent = 'mapped';
                    if (data.agreement_pct >= 0) {
                        document.getElementById('agreement-info').innerHTML =
                            `Agreement: <strong>${data.agreement_pct}%</strong>`;
                    }
                    updateRightImage();

                } else if (data.type === 'error') {
                    log('ERROR: ' + data.message, 'error');
                    isMapping = false;
                    document.getElementById('btn-map').disabled = false;
                    document.getElementById('btn-map-settings').disabled = false;

async function mapWithSettings() {
    const fireSize = parseFloat('{{ fire_size_ha }}') || 0;
    try {
        const r = await fetch('/api/settings');
        const settings = await r.json();
        if (!Array.isArray(settings) || settings.length === 0) {
            log('No recommended settings configured. Use the Settings panel on the fire list page.', 'error');
            return;
        }
        // Find matching row for this fire size
        const row = settings.find(s =>
            fireSize >= s.min_ha && (s.max_ha == null || fireSize < s.max_ha));
        if (!row) {
            log('No matching settings row for fire size ' + fireSize + ' ha.', 'error');
            return;
        }
        const p = row.params;
        // Apply settings to form
        const setVal = (id, val) => {
            const el = document.getElementById(id);
            if (el && val != null) el.value = val;
        };
        // Apply settings to form
        setVal('p-padding', p.padding);
        setVal('p-sample_rate', p.sample_rate);
        setVal('p-min_samples', p.min_samples);
        setVal('p-max_samples', p.max_samples);
        setVal('p-seed', p.seed);
        setVal('p-embed_bands', p.embed_bands);
        setVal('p-tsne_perplexity', p.tsne_perplexity);
        setVal('p-tsne_learning_rate', p.tsne_learning_rate);
        setVal('p-tsne_max_iter', p.tsne_max_iter);
        setVal('p-tsne_n_components', p.tsne_n_components);
        setVal('p-tsne_random_state', p.tsne_random_state);
        setVal('p-rf_n_estimators', p.rf_n_estimators);
        setVal('p-rf_max_depth', p.rf_max_depth);
        setVal('p-rf_max_features', p.rf_max_features);
        setVal('p-rf_random_state', p.rf_random_state);
        setVal('p-controlled_ratio', p.controlled_ratio);
        setVal('p-hdbscan_min_samples', p.hdbscan_min_samples);
        setVal('p-contour_width', p.contour_width);
        if (p.tsne_init) {
            const initEl = document.getElementById('p-tsne_init');
            if (initEl) initEl.value = p.tsne_init;
        }
        updateSampleSize();
        log(`Applied recommended settings for ${row.min_ha} ha → ${row.max_ha != null ? row.max_ha + ' ha' : '∞'}`, 'success');

        // Re-crop if padding changed, then map
        const newPad = parseFloat(p.padding);
        const curPad = parseFloat(document.getElementById('p-padding').value);
        if (!isNaN(newPad) && newPad !== curPad) {
            log(`Re-cropping with padding=${newPad}...`);
            document.getElementById('btn-map').disabled = true;
            document.getElementById('btn-map-settings').disabled = true;
                    document.getElementById('btn-serial').disabled = true;
            await prepareFire(newPad);
        }
        startMapping();
    } catch (err) {
        log('Failed to load settings: ' + err.message, 'error');
    }
}

// -----------------------------------------------------------------------
// Unified state poller — replaces refreshStatus, pollSerialResults,
// pollMappingStatus with a single loop that handles all live updates.
// -----------------------------------------------------------------------
let lastKnownStatus = '{{ fire_status }}';

const VIEW_LABELS = {
    pre: 'Pre-fire', post: 'Post-fire',
    diff1: 'Diff (norm)', diff2: 'Diff (ratio)',
    result: 'ML classification', hint: 'Hint perimeter',
};

async function pollFireState() {
    // SSE streaming (startMapping) handles its own updates — skip
    if (sseActive) {
        setTimeout(pollFireState, 2000);
        return;
    }

    try {
        const r = await fetch(`/api/fire/${encodeURIComponent(FIRE)}/console`);
        const data = await r.json();

        // 1. Append new console lines incrementally
        if (data.lines && data.lines.length > serverLineCount) {
            for (let i = serverLineCount; i < data.lines.length; i++) {
                log(data.lines[i]);
            }
            serverLineCount = data.lines.length;
        }

        // 2. Update agreement
        if (data.agreement_pct >= 0) {
            document.getElementById('agreement-info').innerHTML =
                `Agreement: <strong>${data.agreement_pct}%</strong>`;
        }

        // 3. Add new views to dropdowns as they become available
        for (const selId of ['view-select', 'view-select-right']) {
            const sel = document.getElementById(selId);
            for (const v of (data.available_views || [])) {
                if (!sel.querySelector(`option[value="${v}"]`)) {
                    const opt = document.createElement('option');
                    opt.value = v;
                    opt.textContent = VIEW_LABELS[v] || v;
                    sel.appendChild(opt);
                }
            }
            if (data.has_comparison && !sel.querySelector('option[value="comparison"]')) {
                const opt = document.createElement('option');
                opt.value = 'comparison';
                opt.textContent = 'Comparison (figure)';
                sel.appendChild(opt);
            }
            if (data.has_brush_comparison && !sel.querySelector('option[value="brush_comparison"]')) {
                const opt = document.createElement('option');
                opt.value = 'brush_comparison';
                opt.textContent = 'Brush comparison';
                sel.appendChild(opt);
            }
        }
        if (data.has_comparison) hasComparison = true;

        // 4. Update serial results gallery as they arrive
        const serialResults = data.serial_results || [];
        if (serialResults.length > 0 && serialResults.length !== lastSerialCount) {
            showSerialGallery(serialResults);
            lastSerialCount = serialResults.length;
        }

        // 5. Handle status transitions
        if (data.status !== lastKnownStatus) {
            const oldStatus = lastKnownStatus;
            lastKnownStatus = data.status;
            document.getElementById('status-text').textContent = data.status;

            if (data.status === 'mapped' && (oldStatus === 'mapping' || isMapping)) {
                // Mapping just finished (this user or another session)
                isMapping = false;
                document.getElementById('btn-map').disabled = false;
                document.getElementById('btn-map-settings').disabled = false;
                document.getElementById('btn-serial').disabled = false;
                document.getElementById('btn-accept').style.display = '';

                // Switch to result view
                const sel = document.getElementById('view-select');
                if (sel.querySelector('option[value="post"]')) sel.value = 'post';
                switchView();
                const selR = document.getElementById('view-select-right');
                if (selR.querySelector('option[value="result"]')) selR.value = 'result';
                else if (selR.querySelector('option[value="comparison"]')) selR.value = 'comparison';
                if (splitActive) switchViewRight();

                if (oldStatus === 'mapping' && !sseActive) {
                    log('Mapping complete!', 'success');
                }

            } else if (data.status === 'accepted') {
                isMapping = false;
                document.getElementById('btn-accept').style.display = 'none';
                document.getElementById('serial-gallery').style.display = 'none';
                document.getElementById('btn-map').disabled = false;
                document.getElementById('btn-map-settings').disabled = false;
                document.getElementById('btn-serial').disabled = false;
                if (oldStatus !== lastKnownStatus) {
                    log('Fire accepted.', 'success');
                }

            } else if (data.status === 'error' && isMapping) {
                isMapping = false;
                document.getElementById('btn-map').disabled = false;
                document.getElementById('btn-map-settings').disabled = false;
                document.getElementById('btn-serial').disabled = false;
                log('Mapping failed.', 'error');

            } else if (data.status === 'mapping') {
                isMapping = true;
                document.getElementById('btn-map').disabled = true;
                document.getElementById('btn-map-settings').disabled = true;
                document.getElementById('btn-serial').disabled = true;
                document.getElementById('btn-accept').style.display = 'none';
            }
        }

        // Keep buttons in sync even without status change
        if (data.status === 'ready' || data.status === 'mapped') {
            document.getElementById('btn-map').disabled = false;
            document.getElementById('btn-map-settings').disabled = false;
            document.getElementById('btn-serial').disabled = false;
        }
        if (data.status === 'mapped') {
            document.getElementById('btn-accept').style.display = '';
        }

    } catch {}

    // Poll faster when mapping, slower when idle
    setTimeout(pollFireState, isMapping ? 2000 : 5000);
}

(function() {
    const handle = document.getElementById('resize-handle');
    const consoleSec = document.getElementById('console-section');
    let dragging = false;
    let startY = 0;
    let startH = 0;

    handle.addEventListener('mousedown', (e) => {
        dragging = true;
        startY = e.clientY;
        startH = consoleSec.offsetHeight;
        handle.classList.add('active');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const newH = Math.max(30, startH + (startY - e.clientY));
        consoleSec.style.height = newH + 'px';
        // Auto-hide output if dragged very small
        const out = document.getElementById('console-output');
        if (newH <= 35) {
            out.style.display = 'none';
            consoleCollapsed = true;
            document.getElementById('console-toggle').innerHTML = '&#9650;';
        } else if (consoleCollapsed) {
            out.style.display = '';
            consoleCollapsed = false;
            document.getElementById('console-toggle').innerHTML = '&#9660;';
        }
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
})();

function formatParams(params) {
    if (!params || typeof params !== 'object') return '';
    const keys = Object.keys(params).filter(k => params[k] != null && params[k] !== '');
    if (keys.length === 0) return '<em>No parameters</em>';
    return '<table style="font-size:10px;border-collapse:collapse;width:100%">' +
        keys.map(k => `<tr><td style="padding:1px 6px 1px 0;color:#888">${k}</td><td style="padding:1px 0">${params[k]}</td></tr>`).join('') +
        '</table>';
}

function showSerialGallery(results) {
    const gallery = document.getElementById('serial-gallery');
    const items = document.getElementById('serial-gallery-items');
    gallery.style.display = '';
    items.innerHTML = '';

    // Sort by agreement descending
    const sorted = [...results].sort(
        (a, b) => (b.agreement_pct || -1) - (a.agreement_pct || -1));

    for (const r of sorted) {
        const isBest = r === sorted[0] && r.agreement_pct >= 0;
        const div = document.createElement('div');
        div.className = 'serial-run-card';
        div.id = 'serial-card-' + r.run_id;
        div.style.cssText = 'padding:8px;cursor:pointer;' +
            'border:2px solid ' + (isBest ? '#2d8a4e' : '#ddd') + ';border-radius:6px;' +
            'background:' + (isBest ? '#f0fff4' : '#fff');
        div.onclick = function(e) {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
            viewSerialRun(r.run_id);
        };

        const agr = r.agreement_pct >= 0 ? r.agreement_pct + '%' : 'failed';
        const badge = isBest ? ' <span style="color:#2d8a4e;font-weight:600">(best)</span>' : '';
        const errMsg = r.error ? `<span style="color:#cc3333;font-size:11px"> ${r.error}</span>` : '';
        const paramsId = `serial-params-${r.run_id}`;

        div.innerHTML = `
            <div style="display:flex;align-items:center;gap:8px">
                <img src="/api/fire/${encodeURIComponent(FIRE)}/serial/${r.run_id}/image?t=${Date.now()}"
                     style="width:80px;height:60px;object-fit:cover;border-radius:4px;cursor:pointer;image-rendering:pixelated"
                     onclick="viewSerialRun(${r.run_id})" onerror="this.style.display='none'">
                <div style="flex:1;font-size:12px">
                    <strong>Run ${r.run_id}</strong>${badge} — Agreement: ${agr}${errMsg}<br>
                    <a href="#" style="font-size:10px;color:#0066cc" onclick="event.preventDefault();
                        var el=document.getElementById('${paramsId}');
                        el.style.display=el.style.display==='none'?'block':'none'">
                        Show/hide parameters</a>
                </div>
                ${r.agreement_pct >= 0 ? `<button class="btn btn-success" style="font-size:11px;padding:2px 8px"
                    onclick="acceptSerialRun(${r.run_id})">Accept</button>` : ''}
            </div>
            <div id="${paramsId}" style="display:none;margin-top:6px;padding:4px 8px;background:#f7f7fa;border-radius:4px">
                ${formatParams(r.params)}
            </div>
        `;
        items.appendChild(div);
    }
}

function viewSerialRun(runId) {
    // Highlight selected run in gallery
    document.querySelectorAll('.serial-run-card').forEach(el => {
        el.style.borderColor = '#ddd';
        el.style.background = '#fff';
    });
    const card = document.getElementById('serial-card-' + runId);
    if (card) {
        card.style.borderColor = '#2d8a4e';
        card.style.background = '#f0fff4';
    }

    // Load this run's overlay directly into the left image pane
    const img = document.getElementById('main-img');
    const loadMsg = document.getElementById('loading-msg');
    img.src = `/api/fire/${encodeURIComponent(FIRE)}/serial/${runId}/image?t=${Date.now()}`;
    img.onload = () => {
        loadMsg.style.display = 'none';
        img.style.display = 'block';
        updateTransform();  // keep current zoom/pan
    };
    img.onerror = () => {
        loadMsg.style.display = 'block';
        loadMsg.textContent = `Run ${runId} image not available`;
        img.style.display = 'none';
    };
}

async function acceptSerialRun(runId) {
    if (!confirm(`Accept run ${runId} as the final result?`)) return;
    try {
        const r = await fetch(`/api/fire/${encodeURIComponent(FIRE)}/serial/${runId}/accept`, {
            method: 'POST',

        if (data.status === 'accepted') {

        }
    } catch (err) {
        log('Accept failed: ' + err.message, 'error');
    }
}

                if (el) el.value = p.tsne_init;

        // Show agreement if available

                `Agreement: <strong>${data.agreement_pct}%</strong>`;

        const serialResults = data.serial_results || [];
        if (serialResults.length > 0) {
            showSerialGallery(serialResults);
            lastSerialCount = serialResults.length;
        }
    } catch {}
}

function switchViewRight() {
    if (!splitActive) return;
    const view = document.getElementById('view-select-right').value;
    if (!view) return;
    const rightImg = document.getElementById('right-img');

    if (view === 'comparison') {
        rightImg.src = `/api/fire/${FIRE}/comparison?t=${Date.now()}`;
    } else if (view === 'brush_comparison') {
        rightImg.src = `/api/fire/${FIRE}/brush_comparison?t=${Date.now()}`;
    } else {
        rightImg.src = `/api/fire/${FIRE}/preview/${view}?t=${Date.now()}`;
    }

    rightImg.onload = () => {
        rightImg.style.display = 'block';
        if (firstLoad) { zoomFitRight(); }
        else { syncRightPane(); }
    };
    rightImg.onerror = () => {
        rightImg.style.display = 'none';
    };
}

function updateRightImage() {
    switchViewRight();
}

function zoomFitRight() {
    const img = document.getElementById('right-img');
    const area = document.getElementById('image-area-right');
    if (!img.naturalWidth || !img.naturalHeight) return;
    rightZoomScale = Math.min(
        area.clientWidth / img.naturalWidth,
        area.clientHeight / img.naturalHeight);
    rightPanX = (area.clientWidth - img.naturalWidth * rightZoomScale) / 2;
    rightPanY = (area.clientHeight - img.naturalHeight * rightZoomScale) / 2;
    img.style.transform = `translate(${rightPanX}px, ${rightPanY}px) scale(${rightZoomScale})`;
}

// Sync zoom/pan: when left pane zooms, match in right pane
function syncRightPane() {
    if (!splitActive) return;
    const rightImg = document.getElementById('right-img');
    rightImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
}

(function() {
    try {
        const order = JSON.parse(sessionStorage.getItem('fireOrder') || '[]');
        if (order.length < 2) return;
        const idx = order.indexOf(FIRE);
        if (idx < 0) return;
        if (idx > 0) {
            const prev = document.getElementById('btn-prev');
            prev.href = '/fire/' + encodeURIComponent(order[idx - 1]);
            prev.title = order[idx - 1];
            prev.style.display = '';
        }
        if (idx < order.length - 1) {
            const next = document.getElementById('btn-next');
            next.href = '/fire/' + encodeURIComponent(order[idx + 1]);
            next.title = order[idx + 1];
            next.style.display = '';
        }
    } catch {}
})();

// -----------------------------------------------------------------------
// Init
// -----------------------------------------------------------------------
// -----------------------------------------------------------------------
// Collapsible control panel
// -----------------------------------------------------------------------
function toggleControlPanel() {
    const panel = document.getElementById('control-panel');
    const btn = document.getElementById('panel-toggle');
    const hidden = panel.style.display === 'none';
    panel.style.display = hidden ? '' : 'none';
    btn.innerHTML = hidden ? '&#9654;' : '&#9664;';
    sessionStorage.setItem('panelHidden', hidden ? '' : '1');
    // Re-fit images after layout change
    setTimeout(() => { zoomFit(); if (splitActive) zoomFitRight(); }, 50);
}

// Restore panel state
if (sessionStorage.getItem('panelHidden') === '1') {
    document.getElementById('control-panel').style.display = 'none';
    document.getElementById('panel-toggle').innerHTML = '&#9664;';
}

prepareFire(null);
loadNotes();
// Start the unified state poller (handles all live updates)
setTimeout(pollFireState, 3000);
</script>
