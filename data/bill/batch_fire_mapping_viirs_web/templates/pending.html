<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>Batch Fire Mapping</h1>
    <img src="/static/BC-Wildfire-Service-logo.png" alt="BC Wildfire Service" class="header-logo">
</header>

<div style="max-width:500px;margin:80px auto;text-align:center;padding:40px 24px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
    <h2 style="margin-bottom:16px">{{ title }}</h2>
    <p style="color:#555;margin-bottom:20px">{{ message }}</p>
    <p style="font-size:13px;color:#888">Your IP: <strong>{{ ip }}</strong></p>
    <div id="status-msg" style="margin-top:20px;font-size:13px;color:#888"></div>
</div>

<script>
const autoRefresh = {{ auto_refresh }};

async function checkAccess() {
    if (!autoRefresh) return;
    try {
        const r = await fetch('/api/access/status');
        const data = await r.json();
        if (data.status === 'approved') {
            document.getElementById('status-msg').innerHTML =
                '<strong style="color:#2d8a4e">Access approved! Redirecting...</strong>';
            setTimeout(() => window.location.href = '/', 1000);
        } else if (data.status === 'blocked') {
            document.getElementById('status-msg').innerHTML =
                '<strong style="color:#cc3333">Access denied by administrator.</strong>';
        } else {
            document.getElementById('status-msg').textContent =
                'Checking... (auto-refreshes every 5 seconds)';
        }
    } catch {}
}

if (autoRefresh) {
    setInterval(checkAccess, 5000);
    checkAccess();
}
</script>
</body>
</html>
